# ============================================================
# Gmail SMTP Email Configuration
# Setup: Google Account -> Security -> App Passwords -> Create App Password
# Replace with your Gmail and App Password:
#   MAIL_USERNAME=yourmail@gmail.com
#   MAIL_PASSWORD=xxxx xxxx xxxx xxxx  (16-char App Password, no spaces)
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:adoraledvn@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_gmail_app_password_here}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
# Set to true to disable email sending (useful for development without email setup)
app.email.enabled=${EMAIL_ENABLED:false}
app.email.from=${MAIL_FROM:adoraledvn@gmail.com}
